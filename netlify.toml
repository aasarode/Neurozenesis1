[build]
  base = ""
  publish = "_site"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/conversation"
  to = "/conversation/"
  status = 301

[identity]
  enabled = true

[gateway]
  enabled = true
